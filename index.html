<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Binário PRO - Upload Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #111;
            color: #fff;
            text-align: center;
        }

        /* ESTADOS DE TELA */
        #telaInicial, #jogoTela { display: none; padding: 20px; }
        .active { display: block !important; }

        /* UPLOAD AREA */
        .upload-box {
            border: 2px dashed #444;
            padding: 40px;
            margin: 20px auto;
            max-width: 500px;
            background: #1a1a1a;
            border-radius: 15px;
        }

        /* SPLIT SCREEN */
        .split-container {
            display: flex;
            width: 100vw;
            height: 65vh;
            margin: 20px 0;
            border-top: 2px solid #333;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 10px;
        }

        .left-pane { background: #0d0d0d; border-right: 2px solid #333; }
        .right-pane { background: #111; }

        .binary-list {
            font-family: 'Courier New', monospace;
            color: #00ff41;
            font-size: 1.5rem;
            letter-spacing: 5px;
            line-height: 1.4;
            text-align: left;
        }

        .grid { display: grid; gap: 2px; background: #444; padding: 2px; }
        .cell {
            width: 25px;
            height: 25px;
            background: white;
            cursor: pointer;
        }
        .cell.active { background: #222; }
        .cell.correct { background: #00c853 !important; }
        .cell.wrong { background: #d50000 !important; }

        /* BOTÕES */
        button {
            padding: 12px 25px; margin: 10px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .btn-upload { background: #2196f3; color: white; }
        .btn-validar { background: #00c853; color: white; }
        .btn-download { background: #9c27b0; color: white; }

        input[type="file"] { display: none; }

        @media (max-width: 768px) {
            .split-container { flex-direction: column; height: auto; }
            .cell { width: 20px; height: 20px; }
        }
    </style>
</head>
<body>

<!-- TELA INICIAL / UPLOAD -->
<div id="telaInicial" class="active">
    <h1>🖼️ Criador de Desafio Binário</h1>
    <p>Faça upload de uma imagem simples (ícone ou desenho) para transformar em jogo.</p>
    
    <div class="upload-box">
        <label for="fileInput" class="btn-upload" style="display: inline-block; cursor: pointer; padding: 15px 30px;">
            📁 Selecionar Imagem
        </label>
        <input type="file" id="fileInput" accept="image/*">
        <p id="fileName" style="margin-top: 15px; color: #888;">Nenhum arquivo selecionado</p>
        <small>Recomendado: Imagens pequenas (ex: 20x20 pixels)</small>
    </div>
</div>

<!-- TELA DO JOGO -->
<div id="jogoTela">
    <button onclick="location.reload()" style="background:#555; color:white;">⬅ Novo Desafio</button>
    
    <div class="split-container" id="captureTarget">
        <div class="pane left-pane">
            <h3 style="color: #666;">CÓDIGO GERADO</h3>
            <div id="binaryDisplay" class="binary-list"></div>
        </div>
        <div class="pane right-pane">
            <h3 style="color: #666;">DESENHE AQUI</h3>
            <div id="gridDisplay" class="grid"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-validar" onclick="validar()">✔ Validar</button>
        <button class="btn-download" onclick="baixarDesafio()">📥 Baixar para Alunos</button>
    </div>
</div>

<canvas id="helperCanvas" style="display:none;"></canvas>

<script>
    const fileInput = document.getElementById('fileInput');
    const helperCanvas = document.getElementById('helperCanvas');
    const ctx = helperCanvas.getContext('2d');
    
    let mapaBinario = [];

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('fileName').textContent = file.name;
        const reader = new FileReader();

        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                processarImagem(img);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function processarImagem(img) {
        // Redimensiona para um tamanho jogável (máximo 30px de largura/altura)
        let w = img.width;
        let h = img.height;
        const max = 25; 

        if (w > max || h > max) {
            const ratio = Math.min(max / w, max / h);
            w = Math.floor(w * ratio);
            h = Math.floor(h * ratio);
        }

        helperCanvas.width = w;
        helperCanvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);

        const imgData = ctx.getImageData(0, 0, w, h).data;
        mapaBinario = [];

        for (let y = 0; y < h; y++) {
            let linha = "";
            for (let x = 0; x < w; x++) {
                const i = (y * w + x) * 4;
                const r = imgData[i];
                const g = imgData[i+1];
                const b = imgData[i+2];
                const alpha = imgData[i+3];

                // Critério: se for escuro ou opaco, vira 1. Se for claro ou transparente, vira 0.
                const luminosidade = (r + g + b) / 3;
                linha += (luminosidade < 128 && alpha > 50) ? "1" : "0";
            }
            mapaBinario.push(linha);
        }

        iniciarJogo(w);
    }

    function iniciarJogo(colunas) {
        document.getElementById('telaInicial').classList.remove('active');
        document.getElementById('jogoTela').classList.add('active');

        // Mostrar binários
        document.getElementById('binaryDisplay').innerHTML = mapaBinario.join('<br>');

        // Criar Grid
        const grid = document.getElementById('gridDisplay');
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${colunas}, 1fr)`;

        mapaBinario.forEach(linha => {
            [...linha].forEach(bit => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.bit = bit;
                cell.onclick = () => {
                    cell.classList.toggle('active');
                    cell.classList.remove('correct', 'wrong');
                };
                grid.appendChild(cell);
            });
        });
    }

    function validar() {
        const cells = document.querySelectorAll('.cell');
        let erro = false;
        
        cells.forEach(c => {
            const is1 = c.dataset.bit === "1";
            const active = c.classList.contains('active');

            if(is1 && active) c.classList.add('correct');
            else if(!is1 && active) { c.classList.add('wrong'); erro = true; }
            else if(is1 && !active) erro = true;
        });

        if(!erro) alert("🎉 Perfeito! A imagem foi decodificada corretamente.");
        else alert("❌ Quase lá! Alguns pixels estão incorretos.");
    }

    function baixarDesafio() {
        const target = document.getElementById('captureTarget');
        // Limpa marcações de erro/acerto antes de baixar
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('correct', 'wrong', 'active'));
        
        html2canvas(target).then(canvas => {
            const link = document.createElement('a');
            link.download = 'desafio-binario-personalizado.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
