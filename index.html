<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Binário | Mobile Only</title>
    <style>
        :root {
            --bg: #000000;
            --accent: #00ff66;
            --text: #ffffff;
            --cell-size: 45px;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* --- BLOQUEIO DESKTOP --- */
        #desktop-blocker {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* Ativa o bloqueio em telas maiores que 1024px (Laptops/PCs) */
        @media (min-width: 1025px) {
            #desktop-blocker { display: flex; }
            #app-container, #matrixBg { display: none; }
        }

        #matrixBg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            opacity: 0.2;
        }

        #app-container {
            position: relative;
            z-index: 2;
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .active { display: flex; }

        .menu-container { margin: auto; text-align: center; width: 90%; }
        
        .fases-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }

        .fase-btn { 
            flex: 1; height: 100px; 
            background: #0a0a0a; border: 2px solid #222; 
            border-radius: 20px; color: #fff; 
            font-size: 1.5rem; font-weight: bold;
            opacity: 0.3; transition: 0.3s;
        }
        
        .fase-btn.liberada { border-color: var(--accent); opacity: 1; }

        .header-jogo {
            padding: 20px;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #timer-display { font-family: monospace; font-size: 1.8rem; color: #ff3e00; }

        .game-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .binary-box {
            font-family: monospace;
            background: #0a0a0a;
            padding: 15px;
            border-radius: 12px;
            color: var(--accent);
            font-size: 1.2rem;
            letter-spacing: 5px;
            margin-bottom: 25px;
            border: 1px solid #222;
        }

        .grid { 
            display: grid; gap: 8px; padding: 15px; 
            background: #0f0f0f; border-radius: 15px; 
        }

        .cell { 
            width: var(--cell-size); height: var(--cell-size); 
            background: #222; border-radius: 8px; 
        }
        .cell.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .footer-controls {
            padding: 25px;
            display: flex; gap: 15px;
            background: #000;
        }

        .btn-game {
            flex: 1; padding: 20px; border-radius: 15px;
            font-weight: 900; border: none; text-transform: uppercase;
        }
        .btn-compilar { background: var(--accent); color: #000; }
        .btn-limpar { background: transparent; color: #fff; border: 1px solid #444; }

        /* Ajuste para celulares pequenos */
        @media (max-width: 400px) {
            :root { --cell-size: 35px; }
            .binary-box { font-size: 1rem; }
        }
    </style>
</head>
<body>

<!-- MENSAGEM PARA USUÁRIOS DE PC -->
<div id="desktop-blocker">
    <h1 style="color: #ff3e00;">ACESSO NEGADO</h1>
    <p>Este terminal de hacking é restrito a dispositivos portáteis (Mobile/Tablet).</p>
    <div style="font-family: monospace; color: #555; margin-top: 20px;">ERR_DEVICE_NOT_SUPPORTED</div>
</div>

<canvas id="matrixBg"></canvas>

<div id="app-container">
    <div id="telaMenu" class="screen active">
        <div class="menu-container">
            <h1 style="font-size: 2.5rem; margin:0;">PIXEL BINÁRIO</h1>
            <p style="color:var(--accent); letter-spacing: 3px; font-size: 0.8rem;">MOBILE DECODER</p>
            <div class="fases-wrapper">
                <button id="fase0" class="fase-btn" onclick="jogarNivel(0)">01</button>
                <button id="fase1" class="fase-btn" onclick="jogarNivel(1)">02</button>
                <button id="fase2" class="fase-btn" onclick="jogarNivel(2)">03</button>
            </div>
        </div>
    </div>

    <div id="jogoTela" class="screen">
        <div class="header-jogo">
            <button onclick="irParaHome()" style="background:none; border:1px solid #444; color:#888; padding:10px; border-radius:10px;">SAIR</button>
            <div id="timer-display">00:00</div>
            <div id="nomeObjeto" style="font-weight:bold; color:var(--accent);">DATA.EXE</div>
        </div>
        <div class="game-content">
            <div id="binaryDisplay" class="binary-box"></div>
            <div id="gridDisplay" class="grid"></div>
        </div>
        <div class="footer-controls">
            <button class="btn-game btn-limpar" onclick="limpar()">Reset</button>
            <button class="btn-game btn-compilar" onclick="validar()">Compilar</button>
        </div>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(f, t, d) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.value = f; g.gain.value = 0.1;
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    // Matrix
    const c = document.getElementById('matrixBg'), ctx = c.getContext('2d');
    let drops = [];
    function init() { c.width = window.innerWidth; c.height = window.innerHeight; drops = Array(Math.floor(c.width/20)).fill(1); }
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,c.width,c.height);
        ctx.fillStyle = "#0f6"; drops.forEach((y, i) => {
            ctx.fillText(Math.floor(Math.random()*2), i*20, y*20);
            if(y*20 > c.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
        });
    }
    window.addEventListener('resize', init); init(); setInterval(draw, 50);

    const NIVEIS = [
        {m:["0110","1111","1111","0110"], n:"NÚCLEO", t:30},
        {m:["011110","100001","101101","011110"], n:"CHAVE", t:45},
        {m:["00111100","01111110","11011011","11111111"], n:"PORTAL", t:60}
    ];

    let nivelAtual = 0, timerId = null, progresso = parseInt(localStorage.getItem('pixelProgresso')) || 0;

    function jogarNivel(idx) {
        if(idx > progresso) return;
        nivelAtual = idx;
        document.getElementById('telaMenu').classList.remove('active');
        document.getElementById('jogoTela').classList.add('active');
        const d = NIVEIS[idx];
        document.getElementById('binaryDisplay').innerHTML = d.m.join('<br>');
        document.getElementById('nomeObjeto').textContent = d.n;
        
        const g = document.getElementById('gridDisplay');
        g.innerHTML = "";
        g.style.gridTemplateColumns = `repeat(${d.m[0].length}, 1fr)`;
        d.m.forEach(l => [...l].forEach(b => {
            const cell = document.createElement('div');
            cell.className = 'cell'; cell.dataset.bit = b;
            cell.onclick = () => { playSound(600, 'square', 0.05); cell.classList.toggle('active'); };
            g.appendChild(cell);
        }));

        let t = d.t;
        clearInterval(timerId);
        timerId = setInterval(() => {
            t--;
            document.getElementById('timer-display').textContent = `00:${t<10?'0':''}${t}`;
            if(t<=0) { clearInterval(timerId); irParaHome(); }
        }, 1000);
    }

    function validar() {
        const cells = document.querySelectorAll('.cell');
        let erro = false;
        cells.forEach(c => {
            const is1 = c.dataset.bit === "1";
            if((is1 && !c.classList.contains('active')) || (!is1 && c.classList.contains('active'))) erro = true;
        });

        if(!erro) {
            playSound(800, 'sine', 0.2);
            if(nivelAtual === progresso && progresso < 2) {
                progresso++; localStorage.setItem('pixelProgresso', progresso);
            }
            alert("SUCESSO!"); irParaHome();
        } else {
            playSound(150, 'sawtooth', 0.3);
            alert("FALHA!");
        }
    }

    function irParaHome() {
        clearInterval(timerId);
        document.getElementById('jogoTela').classList.remove('active');
        document.getElementById('telaMenu').classList.add('active');
        atualizarBotoes();
    }

    function atualizarBotoes() {
        for(let i=0; i<3; i++) document.getElementById(`fase${i}`).classList.toggle('liberada', i <= progresso);
    }

    function limpar() { document.querySelectorAll('.cell').forEach(c => c.classList.remove('active')); }

    atualizarBotoes();
</script>
</body>
</html>
