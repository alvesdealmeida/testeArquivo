<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo Binário PRO</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#111;
  color:#fff;
  text-align: center;
}

/* TELAS */
#mapaTela, #jogoTela { display:none; padding: 20px; }
.active { display:block !important; }

/* MAPA */
.mapa{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.fases{
  display:flex;
  flex-wrap: wrap;
  gap:20px;
  margin-top:20px;
  justify-content: center;
}

.fase{
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight: bold;
  transition: 0.3s;
}

.liberada{ background:#00c853; cursor:pointer; color: white; }
.liberada:hover { transform: scale(1.1); }
.bloqueada{ background:#555; cursor: not-allowed; opacity: 0.5; }

/* JOGO */
.container{
  display:flex;
  justify-content: center;
  align-items: flex-start;
  gap: 30px;
  margin-top: 20px;
}

.left{ text-align: left; background: #222; padding: 15px; border-radius: 8px; }
.right{ display:flex; justify-content:center; align-items:center; }

.binary{
  font-family: 'Courier New', monospace;
  letter-spacing: 5px;
  font-size: 20px;
  line-height: 32px;
}

.grid{
  display:grid;
  gap:4px;
}

.cell{
  width:28px;
  height:28px;
  background:white;
  cursor:pointer;
  border: 1px solid #444;
}

.cell.active{ background:black; }
.cell.correct{ background:#00c853 !important; }
.cell.wrong{ background:#d50000 !important; }

/* AVATAR */
#avatar{
  position:fixed;
  bottom:10px;
  left:10px;
  width:60px;
  transition: left 0.5s;
  z-index: 100;
}

button {
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
    border-radius: 5px;
    border: none;
    font-weight: bold;
}

/* RESPONSIVO */
@media(max-width:768px){
  .container{ flex-direction:column; align-items: center; }
  .cell{ width:22px; height:22px; }
}
</style>
</head>

<body>

<!-- MAPA -->
<div id="mapaTela" class="active mapa">
  <h1>🗺️ Escolha a Fase</h1>
  <div id="mapaFases" class="fases"></div>
</div>

<!-- JOGO -->
<div id="jogoTela">
  <button onclick="voltarMapa()" style="background: #555; color: white;">⬅ Voltar</button>
  <h2>🧠 Desafio Binário</h2>

  <div class="container">
    <div id="binary" class="left"></div>
    <div class="right">
      <div id="grid" class="grid"></div>
    </div>
  </div>

  <br>
  <button onclick="validar()" style="background: #00c853; color: white;">✔ Validar</button>
  <button onclick="limpar()" style="background: #ff9100; color: white;">🧹 Limpar</button>
  <button onclick="resetar()" style="background: #d50000; color: white;">🔄 Resetar Tudo</button>

  <h3>🏆 Pontuação: <span id="score">0</span></h3>
</div>

<img id="avatar" src="https://i.imgur.com/6X12F8P.png">

<script>
/* ESTADO GLOBAL */
let imagemAtual = [];
let faseAtivaIdx = 0;
let score = parseInt(localStorage.getItem("score")) || 0;
let serie = "3"; 

let progresso = JSON.parse(localStorage.getItem("progresso")) || { "3":0, "4":0, "5":0 };

const fases = {
  "3": [
    ["00100","01110","11111","01110","00100"],
    ["01110","11111","11111","11111","01110"]
  ],
  "4": [
    ["001100","011110","111111","111111","011110","001100"]
  ],
  "5": [
    ["000111000","001111100","011111110","111111111","011111110","001111110"]
  ]
};

const somAcerto = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const somErro = new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg");

/* FUNÇÕES DE NAVEGAÇÃO */
function desenharMapa() {
    const container = document.getElementById("mapaFases");
    container.innerHTML = "";
    
    // Simplificando: vamos mostrar as fases da série "3" como exemplo
    fases[serie].forEach((f, index) => {
        const btn = document.createElement("div");
        const liberada = index <= progresso[serie];
        btn.className = `fase ${liberada ? 'liberada' : 'bloqueada'}`;
        btn.innerHTML = index + 1;
        if(liberada) btn.onclick = () => irParaFase(index);
        container.appendChild(btn);
    });
}

function irParaFase(index) {
    faseAtivaIdx = index;
    imagemAtual = fases[serie][index];
    document.getElementById("mapaTela").classList.remove("active");
    document.getElementById("jogoTela").classList.add("active");
    render();
}

function voltarMapa() {
    document.getElementById("jogoTela").classList.remove("active");
    document.getElementById("mapaTela").classList.add("active");
    desenharMapa();
}

/* RENDERIZAÇÃO DO JOGO */
function render(){
  const grid = document.getElementById("grid");
  const binary = document.getElementById("binary");
  grid.innerHTML = "";
  binary.innerHTML = "";

  let colunas = imagemAtual[0].length;
  grid.style.gridTemplateColumns = `repeat(${colunas}, 1fr)`;

  imagemAtual.forEach((linha, rIdx) => {
    const row = document.createElement("div");
    row.className = "binary";
    row.textContent = linha; 
    binary.appendChild(row);

    [...linha].forEach((bit, cIdx) => {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.dataset.bit = bit;
      cell.onclick = () => {
        cell.classList.toggle("active");
        cell.classList.remove("correct","wrong");
      };
      grid.appendChild(cell);
    });
  });
}

function validar(){
  const cells = document.querySelectorAll(".cell");
  let tudoCerto = true;

  cells.forEach(cell => {
    const bitOriginal = cell.dataset.bit;
    const estaAtivo = cell.classList.contains("active");

    if (bitOriginal === "1") {
        if (estaAtivo) cell.classList.add("correct");
        else tudoCerto = false;
    } else {
        if (estaAtivo) {
            cell.classList.add("wrong");
            tudoCerto = false;
        }
    }
  });

  if(tudoCerto){
    somAcerto.play();
    alert("🎉 Excelente! Você decodificou a imagem!");
    score += 10;
    if(progresso[serie] === faseAtivaIdx && faseAtivaIdx < fases[serie].length -1) {
        progresso[serie]++;
    }
    salvar();
    animarAvatar();
    document.getElementById("score").textContent = score;
  } else {
    somErro.play();
  }
}

function limpar(){
  document.querySelectorAll(".cell").forEach(c => {
    c.classList.remove("active","correct","wrong");
  });
}

function salvar(){
  localStorage.setItem("score", score);
  localStorage.setItem("progresso", JSON.stringify(progresso));
}

function resetar(){
  if(confirm("Deseja zerar todo o progresso?")){
    localStorage.clear();
    location.reload();
  }
}

function animarAvatar(){
  let avatar = document.getElementById("avatar");
  let pos = parseInt(avatar.style.left) || 10;
  avatar.style.left = (pos + 100) + "px";
  if(pos > window.innerWidth) avatar.style.left = "-60px";
}

/* INICIAR */
document.getElementById("score").textContent = score;
desenharMapa();
</script>

</body>
</html>
