<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo Binário PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

/* TELAS */
#mapaTela, #jogoTela{ display:none; }
.active{ display:block; }

/* MAPA */
.mapa{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.fases{
  display:flex;
  gap:20px;
  margin-top:20px;
}

.fase{
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
}

.liberada{ background:#00c853; cursor:pointer; }
.bloqueada{ background:#555; }

/* JOGO */
.container{
  display:flex;
  height:65vh;
}

.left{ width:50%; padding:10px; }
.right{
  width:50%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.binary{
  font-family:monospace;
  letter-spacing:3px;
}

.grid{
  display:grid;
  gap:2px;
}

.cell{
  width:30px;
  height:30px;
  background:white;
  cursor:pointer;
}

.cell.active{ background:black; }
.cell.correct{ background:#00c853; }
.cell.wrong{ background:#d50000; }

/* AVATAR */
#avatar{
  position:absolute;
  bottom:10px;
  left:10px;
  width:50px;
  transition: left 0.5s;
}

/* RESPONSIVO */
@media(max-width:768px){
  .container{ flex-direction:column; }
  .left,.right{ width:100%; }
  .cell{ width:20px;height:20px; }
}
</style>
</head>

<body>

<!-- MAPA -->
<div id="mapaTela" class="active mapa">
  <h1>🗺️ Escolha a Fase</h1>
  <div id="mapaFases" class="fases"></div>
</div>

<!-- JOGO -->
<div id="jogoTela">
  <button onclick="voltarMapa()">⬅ Voltar</button>
  <h2>🧠 Desafio Binário</h2>

  <div class="container">
    <div id="binary" class="left"></div>
    <div class="right">
      <div id="grid" class="grid"></div>
    </div>
  </div>

  <br>
  <button onclick="validar()">✔ Validar</button>
  <button onclick="limpar()">🧹 Limpar</button>

  <h3>🏆 Pontuação: <span id="score">0</span></h3>
</div>

<!-- AVATAR -->
<img id="avatar" src="https://i.imgur.com/6X12F8P.png">

<!-- SONS -->
<audio id="somAcerto" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="somErro" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

<script>

/* VARIÁVEIS */
let faseAtual = 0;
let score = parseInt(localStorage.getItem("score")) || 0;

const fases = [
 ["00000","00100","01110","00100","00000"],
 ["00000","01110","11111","01110","00000"],
 ["00100","01110","11111","01110","00100"],
 ["00100","00100","11111","00100","00100"]
];

let desbloqueadas = JSON.parse(localStorage.getItem("fases")) || [true,false,false,false];
let imagemAtual = [];

/* MAPA */
function renderMapa(){
  const mapa = document.getElementById("mapaFases");
  mapa.innerHTML="";

  fases.forEach((_,i)=>{
    const div = document.createElement("div");

    div.className = "fase " + (desbloqueadas[i] ? "liberada":"bloqueada");
    div.innerText = i+1;

    if(desbloqueadas[i]){
      div.onclick = ()=>iniciarFase(i);
    }

    mapa.appendChild(div);
  });
}

/* INICIAR */
function iniciarFase(i){
  faseAtual = i;

  document.getElementById("mapaTela").classList.remove("active");
  document.getElementById("jogoTela").classList.add("active");

  carregarFase();
}

/* CARREGAR */
function carregarFase(){
  imagemAtual = fases[faseAtual];
  render();
}

/* RENDER */
function render(){
  const grid = document.getElementById("grid");
  const binary = document.getElementById("binary");

  grid.innerHTML="";
  binary.innerHTML="";

  grid.style.gridTemplateColumns = "repeat(5,1fr)";

  imagemAtual.forEach(linha=>{

    const row = document.createElement("div");
    row.className="binary";
    row.innerText = linha.split("").join(" ");
    binary.appendChild(row);

    [...linha].forEach(bit=>{
      const cell = document.createElement("div");
      cell.className="cell";

      cell.onclick = ()=>{
        cell.classList.toggle("active");
      };

      grid.appendChild(cell);
    });

  });
}

/* VALIDAR */
function validar(){
  const cells = document.querySelectorAll(".cell");

  let i=0;
  let correto=true;

  imagemAtual.forEach(linha=>{
    [...linha].forEach(bit=>{
      const ativo = cells[i].classList.contains("active");

      if((bit==="1" && !ativo)||(bit==="0" && ativo)){
        correto=false;
      }
      i++;
    });
  });

  if(correto){
    document.getElementById("somAcerto").play();
    alert("🎉 Acertou!");

    score+=10;
    localStorage.setItem("score",score);

    if(faseAtual+1 < desbloqueadas.length){
      desbloqueadas[faseAtual+1]=true;
      localStorage.setItem("fases",JSON.stringify(desbloqueadas));
    }

    animarAvatar();

  } else {
    document.getElementById("somErro").play();
    alert("❌ Tente novamente");
  }

  document.getElementById("score").innerText=score;
}

/* LIMPAR */
function limpar(){
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("active");
  });
}

/* VOLTAR */
function voltarMapa(){
  document.getElementById("jogoTela").classList.remove("active");
  document.getElementById("mapaTela").classList.add("active");
  renderMapa();
}

/* AVATAR */
function animarAvatar(){
  const avatar = document.getElementById("avatar");
  let pos = parseInt(avatar.style.left) || 10;

  pos += 80;
  avatar.style.left = pos + "px";
}

/* START */
document.getElementById("score").innerText=score;
renderMapa();

</script>

</body>
</html>
