<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Binário PRO - Split Screen</title>
    <!-- Biblioteca para exportar imagem -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #111;
            color: #fff;
            overflow-x: hidden;
        }

        /* TELAS */
        #mapaTela, #jogoTela { display: none; padding: 20px; text-align: center; }
        .active { display: block !important; }

        /* MAPA */
        .fases { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin: 20px 0; }
        .fase { 
            width: 60px; height: 60px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            background: #333; border: 2px solid #444;
        }
        .liberada { background: #00c853; border-color: #00e676; }
        .bloqueada { opacity: 0.5; cursor: not-allowed; }

        /* LAYOUT DIVIDIDO (SPLIT SCREEN) */
        .split-container {
            display: flex;
            width: 100vw;
            height: 70vh;
            margin-top: 20px;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .left-pane { background: #1a1a1a; border-right: 2px solid #333; }
        .right-pane { background: #111; }

        /* ESTILOS DO JOGO */
        #exportArea { 
            padding: 20px; 
            background: #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .binary-list {
            font-family: 'Courier New', monospace;
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            color: #00ff41;
            line-height: 1.5;
            letter-spacing: 5px;
            text-align: left;
        }

        .grid { display: grid; gap: 4px; background: #333; padding: 4px; border-radius: 4px; }
        .cell {
            width: clamp(25px, 4vw, 40px);
            height: clamp(25px, 4vw, 40px);
            background: white;
            cursor: pointer;
        }
        .cell.active { background: #222; }
        .cell.correct { background: #00c853 !important; }
        .cell.wrong { background: #d50000 !important; }

        /* BOTÕES */
        .controls { margin-top: 20px; }
        button {
            padding: 12px 20px; margin: 5px; border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .btn-main { background: #00c853; color: white; }
        .btn-download { background: #2196f3; color: white; }
        .btn-back { background: #555; color: white; }

        @media (max-width: 600px) {
            .split-container { flex-direction: column; height: auto; }
            .left-pane { border-right: none; border-bottom: 2px solid #333; }
        }
    </style>
</head>
<body>

<div id="mapaTela" class="active">
    <h1>🧩 Pixel Binário PRO</h1>
    <p>Selecione uma fase para jogar ou baixar o desafio</p>
    <div id="mapaFases" class="fases"></div>
    <h3>Score: <span id="mainScore">0</span></h3>
</div>

<div id="jogoTela">
    <button class="btn-back" onclick="voltarMapa()">⬅ Voltar</button>
    
    <div class="split-container" id="captureTarget">
        <!-- LADO ESQUERDO: CÓDIGO -->
        <div class="pane left-pane">
            <h3 style="color: #888;">CÓDIGO BINÁRIO</h3>
            <div id="binaryDisplay" class="binary-list"></div>
        </div>

        <!-- LADO DIREITO: GRID -->
        <div class="pane right-pane">
            <h3 style="color: #888;">PAINEL DE PIXELS</h3>
            <div id="gridDisplay" class="grid"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-main" onclick="validar()">✔ Validar</button>
        <button class="btn-download" onclick="baixarDesafio()">📥 Baixar Desafio</button>
        <button onclick="limpar()" style="background:#ff9100; color:white;">🧹 Limpar</button>
    </div>
</div>

<script>
    const fases = {
        "3": [
            ["01110","10101","11111","10101","01110"],
            ["11111","10001","10101","10001","11111"],
            ["00100","01110","11111","01110","00100"]
        ]
    };

    let serie = "3";
    let faseIdx = 0;
    let score = 0;
    let progresso = 0;

    function desenharMapa() {
        const container = document.getElementById("mapaFases");
        container.innerHTML = "";
        fases[serie].forEach((f, i) => {
            const div = document.createElement("div");
            div.className = `fase ${i <= progresso ? 'liberada' : 'bloqueada'}`;
            div.innerHTML = i + 1;
            if(i <= progresso) div.onclick = () => iniciarJogo(i);
            container.appendChild(div);
        });
        document.getElementById("mainScore").textContent = score;
    }

    function iniciarJogo(idx) {
        faseIdx = idx;
        const dadosFase = fases[serie][idx];
        document.getElementById("mapaTela").classList.remove("active");
        document.getElementById("jogoTela").classList.add("active");
        
        // Renderizar Binário
        const bDisplay = document.getElementById("binaryDisplay");
        bDisplay.innerHTML = dadosFase.join("<br>");

        // Renderizar Grid
        const gDisplay = document.getElementById("gridDisplay");
        gDisplay.innerHTML = "";
        gDisplay.style.gridTemplateColumns = `repeat(${dadosFase[0].length}, 1fr)`;

        dadosFase.forEach((linha, r) => {
            [...linha].forEach((bit, c) => {
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.dataset.bit = bit;
                cell.onclick = () => {
                    cell.classList.toggle("active");
                    cell.classList.remove("correct", "wrong");
                };
                gDisplay.appendChild(cell);
            });
        });
    }

    function validar() {
        const cells = document.querySelectorAll(".cell");
        let erro = false;
        cells.forEach(c => {
            const is1 = c.dataset.bit === "1";
            const active = c.classList.contains("active");
            if(is1 && active) c.classList.add("correct");
            else if(!is1 && active) { c.classList.add("wrong"); erro = true; }
            else if(is1 && !active) erro = true;
        });

        if(!erro) {
            alert("🎉 Padrão Correto!");
            score += 10;
            if(faseIdx === progresso && progresso < fases[serie].length -1) progresso++;
            voltarMapa();
        } else {
            alert("❌ Algo está errado. Tente novamente!");
        }
    }

    function baixarDesafio() {
        const target = document.getElementById("captureTarget");
        html2canvas(target).then(canvas => {
            const link = document.createElement('a');
            link.download = `desafio-binario-fase${faseIdx+1}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function voltarMapa() {
        document.getElementById("jogoTela").classList.remove("active");
        document.getElementById("mapaTela").classList.add("active");
        desenharMapa();
    }

    function limpar() {
        document.querySelectorAll(".cell").forEach(c => c.classList.remove("active", "correct", "wrong"));
    }

    desenharMapa();
</script>
</body>
</html>
