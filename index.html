<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo Binário PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

/* TELAS */
#mapaTela, #jogoTela{ display:none; }
.active{ display:block; }

/* MAPA */
.mapa{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.fases{
  display:flex;
  gap:20px;
  margin-top:20px;
}

.fase{
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
}

.liberada{ background:#00c853; cursor:pointer; }
.bloqueada{ background:#555; }

/* JOGO */
.container{
  display:flex;
  height:65vh;
}

.left{ width:50%; padding:10px; }
.right{
  width:50%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.binary{
  font-family:monospace;
  letter-spacing:3px;
}

.grid{
  display:grid;
  gap:2px;
}

.cell{
  width:30px;
  height:30px;
  background:white;
  cursor:pointer;
}

.cell.active{ background:black; }
.cell.correct{ background:#00c853; }
.cell.wrong{ background:#d50000; }

/* AVATAR */
#avatar{
  position:absolute;
  bottom:10px;
  left:10px;
  width:50px;
  transition: left 0.5s;
}

/* RESPONSIVO */
@media(max-width:768px){
  .container{ flex-direction:column; }
  .left,.right{ width:100%; }
  .cell{ width:20px;height:20px; }
}
</style>
</head>

<body>

<!-- MAPA -->
<div id="mapaTela" class="active mapa">
  <h1>🗺️ Escolha a Fase</h1>
  <div id="mapaFases" class="fases"></div>
</div>

<!-- JOGO -->
<div id="jogoTela">
  <button onclick="voltarMapa()">⬅ Voltar</button>
  <h2>🧠 Desafio Binário</h2>

  <div class="container">
    <div id="binary" class="left"></div>
    <div class="right">
      <div id="grid" class="grid"></div>
    </div>
  </div>

  <br>
  <button onclick="validar()">✔ Validar</button>
  <button onclick="limpar()">🧹 Limpar</button>
  <button onclick="resetar()">🔄 Resetar Progresso</button>

  <h3>🏆 Pontuação: <span id="score">0</span></h3>
</div>

<!-- AVATAR -->
<img id="avatar" src="https://i.imgur.com/6X12F8P.png">

<!-- SONS -->
<audio id="somAcerto" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="somErro" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

<script>

/* =========================
   ESTADO GLOBAL
========================= */

let imagemAtual = [];
let score = parseInt(localStorage.getItem("score")) || 0;
let serie = "3";

/* progresso por série */
let progresso = JSON.parse(localStorage.getItem("progresso")) || {
  "3":0,
  "4":0,
  "5":0
};

/* =========================
   FASES (mantido + expandido)
========================= */

const fases = {
  "3": [
    ["00000","00100","01110","00100","00000"],
    ["00000","01110","11111","01110","00000"]
  ],
  "4": [
    ["0000000000","0011111100","0111111110","0011111100","0000000000"],
    ["0000000000","0001111000","0011111100","0001111000","0000000000"]
  ],
  "5": [
    ["000000000000","001111111100","011111111110","001111111100","000000000000"]
  ]
};

/* =========================
   SONS
========================= */

const somAcerto = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const somErro = new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg");

/* =========================
   AVATAR
========================= */

function animarAvatar(){
  let avatar = document.getElementById("avatar");

  if(!avatar){
    avatar = document.createElement("img");
    avatar.id = "avatar";
    avatar.src = "https://i.imgur.com/6X12F8P.png";
    avatar.style.position = "fixed";
    avatar.style.bottom = "10px";
    avatar.style.left = "10px";
    avatar.style.width = "50px";
    document.body.appendChild(avatar);
  }

  let pos = parseInt(avatar.style.left) || 10;
  pos += 50;
  avatar.style.left = pos + "px";
}

/* =========================
   TROCAR SÉRIE
========================= */

function setSerie(s){
  serie = s;
  carregarFase();
}

/* =========================
   CARREGAR FASE
========================= */

function carregarFase(){
  const nivel = progresso[serie] || 0;
  imagemAtual = fases[serie][nivel];
  render();
}

/* =========================
   RENDER (MANTIDO)
========================= */

function render(){
  const grid = document.getElementById("grid");
  const binary = document.getElementById("binary");

  grid.innerHTML = "";
  binary.innerHTML = "";

  let tamanho = imagemAtual[0].length;
  grid.style.gridTemplateColumns = `repeat(${tamanho}, 1fr)`;

  imagemAtual.forEach(linha => {

    const row = document.createElement("div");
    row.className = "binary";
    row.textContent = linha.split("").join(" ");
    binary.appendChild(row);

    [...linha].forEach(bit => {

      const cell = document.createElement("div");
      cell.className = "cell";

      cell.onclick = () => {
        cell.classList.toggle("active");

        const ativo = cell.classList.contains("active");

        cell.classList.remove("correct","wrong");

        if(ativo && bit === "1"){
          cell.classList.add("correct");
        }
        else if(ativo && bit === "0"){
          cell.classList.add("wrong");
        }
      };

      grid.appendChild(cell);

    });

  });
}

/* =========================
   VALIDAR (MELHORADO)
========================= */

function validar(){
  const cells = document.querySelectorAll(".cell");

  let correto = true;
  let i = 0;

  imagemAtual.forEach(linha=>{
    [...linha].forEach(bit=>{
      const ativo = cells[i].classList.contains("active");

      if((bit==="1" && !ativo) || (bit==="0" && ativo)){
        correto = false;
      }
      i++;
    });
  });

  if(correto){
    somAcerto.play();
    alert("🎉 Acertou!");

    score += 10;

    /* progresso */
    if(progresso[serie] < fases[serie].length - 1){
      progresso[serie]++;
    }

    salvar();

    animarAvatar();

  } else {
    somErro.play();
    alert("❌ Ainda não está correto");
  }

  document.getElementById("score").textContent = score;
}

/* =========================
   LIMPAR
========================= */

function limpar(){
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("active","correct","wrong");
  });
}

/* =========================
   SALVAR
========================= */

function salvar(){
  localStorage.setItem("score", score);
  localStorage.setItem("progresso", JSON.stringify(progresso));
}

/* =========================
   RESET (NOVO)
========================= */

function resetar(){
  if(confirm("Deseja zerar o progresso?")){
    localStorage.clear();
    location.reload();
  }
}

/* =========================
   RANKING (MANTIDO)
========================= */

function salvarRanking(){
  let ranking = JSON.parse(localStorage.getItem("ranking")) || [];
  ranking.push(score);
  ranking.sort((a,b)=>b-a);
  ranking = ranking.slice(0,5);

  localStorage.setItem("ranking", JSON.stringify(ranking));
  mostrarRanking();
}

function mostrarRanking(){
  const ul = document.getElementById("ranking");
  ul.innerHTML = "";

  let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

  ranking.forEach(p=>{
    const li = document.createElement("li");
    li.textContent = p + " pontos";
    ul.appendChild(li);
  });
}

/* =========================
   INICIAR
========================= */

document.getElementById("score").textContent = score;
carregarFase();
mostrarRanking();

</script>

</body>
</html>
